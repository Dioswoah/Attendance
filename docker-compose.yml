version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: attendance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: attendance_user
      POSTGRES_PASSWORD: Edgeoffaith12@
      POSTGRES_DB: attendance_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U attendance_user -d attendance_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: attendance_web
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://attendance_user:Edgeoffaith12@@postgres:5432/attendance_db
      - NEXTAUTH_SECRET=RedadairAdmin2024NextAuthSecret
      - NEXTAUTH_URL=http://localhost:8080
      - ADMIN_PASSWORD=RedadairAdmin2024
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
